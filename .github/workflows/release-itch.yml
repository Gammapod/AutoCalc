name: Release To Itch

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or branch)"
        required: false
        default: ""
      version:
        description: "Optional butler userversion override (defaults to tag/version/SHA)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release-itch:
    runs-on: windows-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          $manualVersion = "${{ inputs.version }}"

          if ($manualVersion.Trim()) {
            $releaseVersion = $manualVersion.Trim()
          } elseif ($refType -eq "tag") {
            if ($refName -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
              throw "Tag must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease. Got: $refName"
            }
            $releaseVersion = $refName.Substring(1)
          } else {
            $releaseVersion = "0.0.0-dev.${{ github.run_number }}"
          }

          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved release version: $releaseVersion"

      - name: Install dependencies
        run: npm ci

      - name: Align package version
        shell: pwsh
        run: |
          npm version "${{ steps.release_meta.outputs.release_version }}" --no-git-tag-version --allow-same-version

      - name: Verify build and tests
        run: npm run ci:verify:release

      - name: Build Itch web zip and Windows executable
        run: npm run build:desktop:release

      - name: Assert Itch artifacts
        id: artifacts
        shell: pwsh
        run: |
          $exe = @(Get-ChildItem -Path release -File -Filter *.exe)
          if ($exe.Count -ne 1) {
            throw "Expected exactly one .exe in release/, found $($exe.Count)."
          }

          $zip = @(Get-ChildItem -Path release -File -Filter AutoCalc_itch_v*.zip)
          if ($zip.Count -ne 1) {
            throw "Expected exactly one Itch zip in release/, found $($zip.Count)."
          }

          "windows_exe=$($exe[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "web_zip=$($zip[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Windows artifact: $($exe[0].FullName)"
          Write-Host "Web artifact: $($zip[0].FullName)"

      - name: Resolve butler cache metadata
        id: butler_meta
        shell: pwsh
        run: |
          $channel = "windows-amd64"
          $versionUri = "https://broth.itch.zone/butler/$channel/LATEST/version"
          try {
            $version = (Invoke-WebRequest -Uri $versionUri -UseBasicParsing).Content.Trim()
          } catch {
            Write-Warning "Failed to resolve butler version from $versionUri: $($_.Exception.Message)"
            $version = "latest"
          }
          if (-not $version) {
            $version = "latest"
          }
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved butler cache metadata: channel=$channel version=$version"

      - name: Restore butler cache
        id: butler_cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/butler
          key: butler-${{ runner.os }}-${{ steps.butler_meta.outputs.channel }}-${{ steps.butler_meta.outputs.version }}
          restore-keys: |
            butler-${{ runner.os }}-${{ steps.butler_meta.outputs.channel }}-

      - name: Install butler
        if: steps.butler_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $butlerZip = Join-Path $env:RUNNER_TEMP "butler.zip"
          $butlerDir = Join-Path $env:RUNNER_TEMP "butler"
          $candidateUris = @(
            "https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default",
            "https://broth.itch.zone/butler/windows-amd64-head/LATEST/archive/default"
          )
          $downloaded = $false
          foreach ($uri in $candidateUris) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Invoke-WebRequest -Uri $uri -OutFile $butlerZip
                $downloaded = $true
                Write-Host "Downloaded butler from $uri (attempt $attempt)"
                break
              } catch {
                Write-Warning "Butler download failed from $uri (attempt $attempt): $($_.Exception.Message)"
                Start-Sleep -Seconds (2 * $attempt)
              }
            }
            if ($downloaded) {
              break
            }
          }
          if (-not $downloaded) {
            throw "Failed to download butler from all candidate sources."
          }
          Expand-Archive -Path $butlerZip -DestinationPath $butlerDir -Force

      - name: Add butler to PATH
        shell: pwsh
        run: |
          $butlerDir = Join-Path $env:RUNNER_TEMP "butler"
          if (-not (Test-Path (Join-Path $butlerDir "butler.exe"))) {
            throw "butler.exe not found at expected cache/install location: $butlerDir"
          }
          "$butlerDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $butlerDir "butler.exe") --version

      - name: Push artifacts to Itch channels
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_BUTLER_API_KEY }}
          ITCH_TARGET: ${{ secrets.ITCH_TARGET }}
          ITCH_CHANNEL_WEB: ${{ vars.ITCH_CHANNEL_WEB != '' && vars.ITCH_CHANNEL_WEB || 'html5' }}
          ITCH_CHANNEL_WINDOWS: ${{ vars.ITCH_CHANNEL_WINDOWS != '' && vars.ITCH_CHANNEL_WINDOWS || 'windows' }}
        run: |
          if (-not $env:BUTLER_API_KEY) {
            throw "Missing required secret: ITCH_BUTLER_API_KEY"
          }
          if (-not $env:ITCH_TARGET) {
            throw "Missing required secret: ITCH_TARGET (example: username/game-name)"
          }

          $version = "${{ steps.release_meta.outputs.release_version }}"
          $webZip = "${{ steps.artifacts.outputs.web_zip }}"
          $windowsExe = "${{ steps.artifacts.outputs.windows_exe }}"

          butler push "$webZip" "$($env:ITCH_TARGET):$($env:ITCH_CHANNEL_WEB)" --userversion "$version"
          butler push "$windowsExe" "$($env:ITCH_TARGET):$($env:ITCH_CHANNEL_WINDOWS)" --userversion "$version"
