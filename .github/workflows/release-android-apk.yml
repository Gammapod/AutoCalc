name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or branch)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Verify build and tests
        run: npm run ci:verify:release

      - name: Build Android APK
        run: npm run build:android:apk

      - name: Assert APK artifact exists
        run: |
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Generate SHA256 checksum
        run: |
          sha256sum android/app/build/outputs/apk/release/app-release.apk > android/app/build/outputs/apk/release/app-release.apk.sha256

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoCalc-android-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk.sha256
