      .roll {
        position: absolute;
        left: 50%;
        bottom: calc(100% - 10px);
        z-index: 1;
        transform: translateX(-50%);
        width: calc(100% - 56px);
        height: 0;
        background: repeating-linear-gradient(

          var(--paper) 26px,
          #ece8de 27px,
          var(--paper) 28px
        );
        border: 0 solid #c8c2b4;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        box-shadow: none;
        overflow: hidden;
        pointer-events: none;
        scrollbar-width: none;
        padding: 0 12px;
        font-family: "Courier Prime", "Special Elite", "American Typewriter", "Lucida Typewriter", "Courier New", monospace;
        font-size: 0.85rem;
        color: var(--paper-ink);
        opacity: 0;
        transition:
          height 160ms ease-out,
          border-width 120ms ease-out,
          box-shadow 120ms ease-out,
          padding 120ms ease-out,
          opacity 120ms ease-out;

        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:

        transition:
          width 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          min-height 320ms cubic-bezier(0.2, 0.72, 0.2, 1),

        to {

      }

      @keyframes calc-grow-column {
        from {
          transform: scaleX(0.94);
        }
        to {
          transform: scaleX(1);
        }
      }

      @keyframes calc-grow-both {
        from {
          transform: scale(0.94);
        }
        to {
          transform: scale(1);
        }
      }

      .seg-sign {

      .total-display--imaginary .total-primary-display .seg-sign,

      .total-display--error .total-primary-display .seg--on {

      .total-display--error .total-primary-display .seg-sign,
      .total-display--error .total-primary-display .seg-fraction {

      [data-slot] {
        height: 30px;
        min-height: 30px;
        width: 100%;
        min-width: 0;
        display: flex;
        align-items: center;
        position: relative;
        font-family: "Cascadia Mono", "Cascadia Code", Consolas, "DejaVu Sans Mono", "Courier New", monospace;
        font-size: 0.76rem;
        line-height: 1;
        color: var(--ux-role-default-color, #b4f1d3);

        overflow: hidden;

        flex: 1;

      .slot-display__track {
        display: inline-flex;
        align-items: center;

      [data-slot].slot-display--marquee .slot-display__ellipsis {

      .slot-display__delta-wrap,
      .slot-display__wrap-chip {

      .slot-display__wrap-chip {

      [data-keys] {
        margin-top: 14px;

        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(48px, 1fr));
        gap: var(--gap);
        position: relative;
        transform-origin: bottom right;
      }

      body[data-ui-shell="desktop"] [data-keys] {
        width: 100%;
        margin-inline: auto;
        transform-origin: center bottom;
        transition:
          width 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          height 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          grid-template-columns 320ms cubic-bezier(0.2, 0.72, 0.2, 1),
          grid-template-rows 320ms cubic-bezier(0.2, 0.72, 0.2, 1);
      }

      /* Visualizer window scales from fixed-width and viewport scale tokens. */
      body[data-ui-shell="mobile"] [data-display-window],
      body[data-ui-shell="desktop"] [data-display-window] {
        width: min(100%, calc(var(--v2-visualizer-fixed-width) * var(--v2-visualizer-scale)));
        margin-inline: auto;

      [data-keys][data-keypad-grow="row"] {
        animation: keypad-grow-row 820ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      [data-keys][data-keypad-grow="column"] {
        animation: keypad-grow-column 820ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      [data-keys][data-keypad-grow="both"] {
        animation: keypad-grow-both 880ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      body[data-ui-shell="desktop"] [data-keys][data-keypad-grow="row"],
      body[data-ui-shell="desktop"] [data-keys][data-keypad-grow="column"],
      body[data-ui-shell="desktop"] [data-keys][data-keypad-grow="both"] {
        animation: none;
      }

      @keyframes keypad-grow-row {
        from {
          transform: scaleY(0.92);
        }
        to {
          transform: scaleY(1);
        }
      }

      @keyframes keypad-grow-column {
        from {
          transform: scaleX(0.92);
        }
        to {
          transform: scaleX(1);
        }
      }

      @keyframes keypad-grow-both {
        from {
          transform: scale(0.92);
        }
        to {
          transform: scale(1);
        }
      }

      .storage {

        right: 0;

      .storage-mode-button:disabled {

      [data-storage-sort-controls] {

      .storage-sort-button {

      }

      .storage-sort-button[data-storage-sort-group="all"] {
        background: linear-gradient(180deg, var(--key-global-system-top), var(--key-global-system-bottom));
        color: #fff8ed;
      }

      .storage-sort-button[data-storage-sort-group="value_expression"] {
        background: linear-gradient(180deg, var(--key-value-modifier-top), var(--key-value-modifier-bottom));
        color: #1b2027;
      }

      .storage-sort-button[data-storage-sort-group="slot_operator"] {
        background: linear-gradient(180deg, var(--key-slot-operator-top), var(--key-slot-operator-bottom));
        color: #f4f8ff;
      }

      .storage-sort-button[data-storage-sort-group="utility_bundle"] {
        background: linear-gradient(180deg, var(--key-utility-top), var(--key-utility-bottom));
        color: #fff7f7;
      }

      .storage-sort-button[data-storage-sort-group="settings"] {
        background: linear-gradient(180deg, var(--key-settings-top), var(--key-settings-bottom));
        color: #fffaf0;
      }

      .storage-sort-button:hover:not(:disabled) {
        filter: brightness(1.07);
      }

      .storage-sort-button--active {
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.4),

      .storage-sort-button:disabled {

      [data-storage-keys] {

        --storage-max-columns: 10;

        grid-template-columns: repeat(var(--storage-columns), minmax(0, 1fr));
        grid-auto-rows: minmax(48px, 1fr);

        max-height: calc((var(--storage-visible-rows) * 48px) + ((var(--storage-visible-rows) - 1) * var(--gap)) + 20px);
        margin-inline: auto;
        gap: var(--gap);
        border: 1px solid rgba(91, 62, 33, 0.6);

      .key {

        display: grid;
        place-items: center;
        overflow: hidden;
        text-align: center;
        padding: 0;
        appearance: none;
        -webkit-appearance: none;
        border: 1px solid var(--key-stroke);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--key-top), var(--key-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 2px 0 rgba(45, 53, 63, 0.9),
          0 4px 8px rgba(0, 0, 0, 0.28);
        color: #12151a;
        font-size: 1.15rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform var(--key-release-duration) ease var(--key-release-delay),
          box-shadow var(--key-release-duration) ease var(--key-release-delay),
          background 110ms ease,
          filter 120ms ease;

        width: max-content;
        max-width: none;
        white-space: nowrap;
        text-align: center;
        justify-self: center;
        transform-origin: center center;
        pointer-events: none;

      .key:hover:not(:disabled) {
        filter: brightness(1.04);
      }

      .key:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(0.35);
      }

      .key:active:not(:disabled),
      .key.key--quick-press:not(:disabled) {
        transition:
          transform var(--key-press-in-duration) linear 0ms,
          box-shadow var(--key-press-in-duration) linear 0ms,
          background 110ms ease,
          filter 120ms ease;
        transform: translateY(var(--key-press-depth));
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.35),
          0 1px 0 rgba(45, 53, 63, 0.9),
          0 3px 6px rgba(0, 0, 0, 0.25);
      }

      .key--unlock-animate {
        animation: key-unlock-pulse 1200ms cubic-bezier(0.22, 0.62, 0.22, 1) 1;
      }

      .keypad-slot-enter {
        animation: keypad-slot-enter 760ms cubic-bezier(0.2, 0.74, 0.2, 1) 1;
      }

      @keyframes key-unlock-pulse {
        0% {
          transform: translateY(0);
          filter: brightness(1);
        }
        24% {
          transform: translateY(-4px);
          filter: brightness(1.28) drop-shadow(0 0 8px rgba(188, 255, 214, 0.95));
        }
        32% {
          transform: translateY(-4px);
          filter: brightness(1.28) drop-shadow(0 0 8px rgba(188, 255, 214, 0.95));
        }
        80% {
          transform: translateY(0);
          filter: brightness(1.18) drop-shadow(0 0 7px rgba(188, 255, 214, 0.62));
        }
        100% {
          transform: translateY(0);
          filter: brightness(1);
        }
      }

      @keyframes keypad-slot-enter {
        0% {
          opacity: 0;
          transform: scale(0.92);
          filter: saturate(0.9);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: saturate(1);
        }
      }

      .key:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .key--storage {
        font-size: 1rem;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 1px 0 rgba(57, 39, 22, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.2);

        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 1px 0 rgba(56, 61, 67, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.16);
        transition: none;
        animation: none;

      .key--storage-unlocked:hover:not(:disabled) {
        filter: none;
      }

      .key--storage-unlocked:active:not(:disabled) {
        transform: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 1px 0 rgba(56, 61, 67, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.16);
      }

      .key--storage-unlocked.key--unlock-animate {
        animation: key-unlock-pulse 1200ms cubic-bezier(0.22, 0.62, 0.22, 1) 1;
      }

        color: #0f1218;

        color: #ffffff;

      .key--group-utility {

                <div class="display-stack">
                  <div class="display display--shared" data-display-window data-graph-visible="false">
                    <section class="v2-visualizer-host" data-v2-visualizer-host data-v2-visualizer-panel="total" aria-hidden="false">
                      <section class="v2-total-panel" data-v2-total-panel aria-label="Total visualizer" aria-live="polite" aria-hidden="false"></section>
                      <section class="calc-grapher" data-grapher-device aria-label="Grapher" aria-hidden="true">
                        <div class="grapher-screen">
                          <canvas class="grapher-canvas" data-grapher-canvas aria-label="Roll graph" role="img"></canvas>
                        </div>
                      </section>
                      <section class="v2-feed-panel" data-v2-feed-panel aria-label="Feed visualizer" aria-hidden="true"></section>
                      <section class="v2-title-panel" data-v2-title-panel aria-label="Title visualizer" aria-hidden="true"></section>
                      <section class="v2-factorization-panel" data-v2-factorization-panel aria-label="Prime factorization visualizer" aria-hidden="true"></section>
                                            <section class="v2-eigen-allocator-panel" data-v2-eigen-allocator-panel aria-label="Eigen Allocator visualizer" aria-hidden="true"></section>
                      <section class="v2-algebraic-panel" data-v2-algebraic-panel aria-label="Algebraic visualizer" aria-hidden="true"></section>
                    </section>
                  </div>
                  <div class="display" data-slot></div>
                </div>
                <div data-keys></div>
              </section>
            </section>
          </div>
          <section class="storage" aria-label="Button storage">
            <div class="storage-header">
              <h2 class="storage-title">Storage Drawer</h2>
              <div class="storage-controls">
                <button type="button" class="storage-mode-button" data-storage-mode-toggle>Browse</button>
                <div data-storage-sort-controls role="group" aria-label="Storage sort by key type"></div>
              </div>
            </div>
            <div data-storage-keys></div>
          </section>
        </section>
        <aside class="checklist-shell" aria-label="Unlock checklist clipboard">
          <div class="checklist" data-unlocks></div>
        </aside>
      </main>
    </div>
    <script type="module" src="./dist/src/app/bootstrap.js"></script>
  </body>
</html>
