<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCalc v0.1</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="workspace">
      <main class="app">
        <header class="top">
          <h1>AutoCalc v0.1</h1>
          <button id="reset-save" type="button">Reset save</button>
        </header>

        <section class="display-panel">
          <div class="label">Display</div>
          <div class="display-row">
            <div class="op-spacer" aria-hidden="true"></div>
            <div id="display" class="display lcd" aria-live="polite"></div>
            <button id="display-c" data-key="C" class="display-action" type="button">C</button>
          </div>
        </section>

        <section class="secondary-panel display-row">
          <div id="secondary-op" class="op-indicator" aria-live="polite"></div>
          <div id="secondary-display" class="display lcd" aria-live="polite"></div>
          <button id="display-ce" data-key="CE" class="display-action" type="button">CE</button>
        </section>

        <section class="controls">
          <div class="keypad">
            <button data-key="7" type="button">7</button>
            <button data-key="8" type="button">8</button>
            <button data-key="9" type="button">9</button>
            <button data-key="-" type="button">-</button>
            <button data-key="4" type="button">4</button>
            <button data-key="5" type="button">5</button>
            <button data-key="6" type="button">6</button>
            <button data-key="+" type="button">+</button>
            <button data-key="1" type="button">1</button>
            <button data-key="2" type="button">2</button>
            <button data-key="3" type="button">3</button>
            <button data-key="/" type="button">&divide;</button>
            <button data-key="0" class="zero-wide" type="button">0</button>
            <button data-key="=" type="button">=</button>
            <button data-key="*" type="button">&times;</button>
          </div>
        </section>
      </main>

      <aside id="unlock-window" class="unlock-window">
        <h2>Subtraction Store</h2>
        <section class="unlock">
          <p class="store-note">Subtract the exact listed price to purchase.</p>
          <div class="store-table-wrap">
            <table class="store-table" aria-label="Subtraction Store">
              <thead>
                <tr>
                  <th class="col-price">$</th>
                  <th class="col-item">Item</th>
                  <th class="col-state">State</th>
                </tr>
              </thead>
              <tbody id="store-list"></tbody>
            </table>
          </div>
          <button id="debug-unlock-all" type="button">Debug unlock all</button>
        </section>
      </aside>
    </div>

    <script defer src="./src/app.js"></script>
  </body>
</html>
