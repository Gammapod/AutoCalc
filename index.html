<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCalc v0.1</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>AutoCalc v0.1</h1>
        <button id="reset-save" type="button">Reset save</button>
      </header>

      <section class="display-panel">
        <div class="label">Display</div>
        <div id="display" class="display lcd" aria-live="polite"></div>
      </section>

      <section class="secondary-panel">
        <div id="secondary-op" class="op-indicator" aria-live="polite"></div>
        <div id="secondary-display" class="display lcd" aria-live="polite"></div>
      </section>

      <section class="controls">
        <div class="keypad">
          <button data-key="1" type="button">1</button>
          <button data-key="2" id="key-2" type="button">2</button>
          <button data-key="+" type="button">+</button>
          <button data-key="C" type="button">C</button>
        </div>
      </section>

      <section class="unlock">
        <button id="buy-2" type="button">Unlock 2 (cost: 25)</button>
        <button id="debug-unlock-2" type="button">Debug unlock 2</button>
      </section>
    </main>

    <script defer src="./src/app.js"></script>
  </body>
</html>
