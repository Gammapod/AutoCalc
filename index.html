<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCalc v1 Slice</title>
    <style>
      :root {
        --bg-top: #cfd4dc;
        --bg-bottom: #a8aeb8;
        --body-top: #b8bdc7;
        --body-bottom: #8f96a1;
        --body-stroke: #66707d;
        --panel-dark: #12161c;
        --panel-mid: #202734;
        --panel-soft: #2a3444;
        --lit: #bcffd6;
        --paper: #f4f1e8;
        --paper-ink: #3f3a32;
        --drawer-wood-top: #b98a57;
        --drawer-wood-bottom: #8b6138;
        --drawer-lining-top: #d5bf9c;
        --drawer-lining-bottom: #bfa57f;
        --drawer-stroke: #5b3e21;
        --key-top: #eef2f5;
        --key-bottom: #d4dae0;
        --key-stroke: #5d6773;
        --key-slot-operator-top: #6a7380;
        --key-slot-operator-bottom: #4a5360;
        --key-slot-operator-stroke: #2f3742;
        --key-utility-top: #d55f5f;
        --key-utility-bottom: #a84040;
        --key-utility-stroke: #6e2424;
        --key-execution-top: #4f8f67;
        --key-execution-bottom: #2f6c4a;
        --key-execution-stroke: #1f4a33;
        --key-press-depth: 2px;
        --key-latch-depth: 2px;
        --key-overpress-depth: 3px;
        --key-release-depth: 1px;
        --placeholder: #798291;
        --roll-row-height: 1.19rem;
        --roll-pad-top: 10px;
        --roll-pad-bottom: 8px;
        --gap: 10px;
        --device-width: clamp(300px, 38vw, 420px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 14px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: #0f1218;
      }

      .app-shell {
        display: grid;
        grid-template-columns: auto;
        align-items: start;
      }

      .app-layout {
        display: grid;
        grid-template-columns: auto minmax(260px, 28vw);
        align-items: stretch;
        gap: 16px;
      }

      .play-area {
        display: grid;
        gap: 12px;
        align-items: start;
      }

      .device-row {
        display: grid;
        grid-template-columns: var(--device-width) var(--device-width);
        align-items: start;
        gap: 16px;
      }

      .device {
        width: 100%;
        min-width: 0;
        position: relative;
        gap: 0;
      }

      .device--grapher {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-radius: 24px;
        padding: 14px;
        border: 1px solid var(--body-stroke);
        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -5px 10px rgba(0, 0, 0, 0.2),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .grapher-screen {
        flex: 0 0 auto;
        width: 100%;
        aspect-ratio: 4 / 3;
        min-height: 0;
        border: 1px solid #515c6a;
        border-radius: 10px;
        padding: 10px;
        background: linear-gradient(180deg, rgba(18, 22, 28, 0.98), rgba(15, 19, 24, 0.98));
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }

      .grapher-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .grapher-slot {
        height: 30px;
        min-height: 30px;
        width: 100%;
        min-width: 0;
        display: flex;
        align-items: center;
        font-family: "Cascadia Mono", "Cascadia Code", Consolas, "DejaVu Sans Mono", "Courier New", monospace;
        font-size: 0.76rem;
        line-height: 1;
        color: #b4f1d3;
        white-space: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-gutter: stable both-edges;
        font-variant-numeric: tabular-nums;
      }

      .roll {
        position: absolute;
        left: 50%;
        bottom: 100%;
        z-index: 1;
        transform: translateX(-50%);
        width: calc(100% - 56px);
        height: 0;
        background: repeating-linear-gradient(
          180deg,
          var(--paper) 0px,
          var(--paper) 26px,
          #ece8de 27px,
          var(--paper) 28px
        );
        border: 0 solid #c8c2b4;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        box-shadow: none;
        overflow: hidden;
        pointer-events: none;
        scrollbar-width: none;
        padding: var(--roll-pad-top) 12px var(--roll-pad-bottom);
        font-family: "Courier Prime", "Special Elite", "American Typewriter", "Lucida Typewriter", "Courier New", monospace;
        font-size: 0.85rem;
        color: var(--paper-ink);
        transition: height 160ms ease-out, border-width 120ms ease-out, box-shadow 120ms ease-out;
      }

      .roll::-webkit-scrollbar {
        display: none;
      }

      .roll[data-roll-visible="true"] {
        height: calc(var(--roll-line-count, 0) * var(--roll-row-height) + var(--roll-pad-top) + var(--roll-pad-bottom));
        border-width: 1px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.18);
      }

      .roll-line {
        display: grid;
        grid-template-columns: 3ch 2fr 1fr;
        column-gap: 1ch;
        line-height: 1.4;
      }

      .roll-prefix {
        grid-column: 1;
        text-align: left;
        white-space: pre;
      }

      .roll-value {
        grid-column: 2;
        justify-self: end;
        text-align: right;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .roll-remainder {
        grid-column: 3;
        justify-self: end;
        text-align: right;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .calc {
        position: relative;
        overflow: visible;
        z-index: 2;
        transform-origin: bottom right;
        border-radius: 24px;
        padding: 16px;
        border: 1px solid var(--body-stroke);
        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -5px 10px rgba(0, 0, 0, 0.2),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .device--grapher[hidden] {
        display: none;
      }

      .calc[data-keypad-grow="row"] {
        animation: calc-grow-row 920ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      .calc[data-keypad-grow="column"] {
        animation: calc-grow-column 920ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      .calc[data-keypad-grow="both"] {
        animation: calc-grow-both 980ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      @keyframes calc-grow-row {
        from {
          transform: scaleY(0.94);
        }
        to {
          transform: scaleY(1);
        }
      }

      @keyframes calc-grow-column {
        from {
          transform: scaleX(0.94);
        }
        to {
          transform: scaleX(1);
        }
      }

      @keyframes calc-grow-both {
        from {
          transform: scale(0.94);
        }
        to {
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .roll {
          transition: none;
        }

        .checklist {
          transition: none;
        }

        .key--unlock-animate {
          animation: none;
        }
      }

      .slot {
        height: 10px;
        margin: 0 22px 12px;
        border-radius: 999px;
        border: 1px solid #596271;
        background: linear-gradient(180deg, #3f4854, #2e3540);
        box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.6);
      }

      .display-stack {
        display: grid;
        gap: 8px;
      }

      .display {
        border: 1px solid #515c6a;
        border-radius: 7px;
        padding: 10px 12px;
        background: linear-gradient(180deg, var(--panel-mid), var(--panel-dark));
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }

      [data-total] {
        position: relative;
        min-height: 70px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .seg-sign {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Consolas", "Courier New", monospace;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1;
        color: var(--lit);
        text-shadow: 0 0 6px rgba(188, 255, 214, 0.45);
        pointer-events: none;
      }

      .seg-fraction {
        font-family: "Consolas", "Courier New", monospace;
        font-size: clamp(20px, 3.4vw, 30px);
        line-height: 1;
        color: var(--lit);
        text-shadow: 0 0 6px rgba(188, 255, 214, 0.45);
      }

      .seg-frame {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 6px;
      }

      .seg-digit {
        position: relative;
        width: clamp(16px, 2.6vw, 22px);
        height: clamp(28px, 4.2vw, 38px);
      }

      .seg {
        position: absolute;
        border-radius: 999px;
        background: var(--lit);
        opacity: 0.12;
      }

      .seg-digit--locked .seg {
        opacity: 0;
      }

      .seg--on {
        opacity: 1;
        box-shadow: 0 0 6px rgba(188, 255, 214, 0.45);
      }

      .seg-a,
      .seg-d,
      .seg-g {
        left: 20%;
        width: 60%;
        height: 10%;
      }

      .seg-a {
        top: 2%;
      }

      .seg-g {
        top: 45%;
      }

      .seg-d {
        top: 88%;
      }

      .seg-b,
      .seg-c,
      .seg-e,
      .seg-f {
        width: 12%;
        height: 42%;
      }

      .seg-b,
      .seg-c {
        left: 82%;
      }

      .seg-e,
      .seg-f {
        left: 6%;
      }

      .seg-f {
        top: 6%;
      }

      .seg-b {
        top: 6%;
      }

      .seg-e {
        top: 52%;
      }

      .seg-c {
        top: 52%;
      }

      [data-slot] {
        height: 30px;
        min-height: 30px;
        width: 100%;
        min-width: 0;
        display: flex;
        align-items: center;
        font-family: "Cascadia Mono", "Cascadia Code", Consolas, "DejaVu Sans Mono", "Courier New", monospace;
        font-size: 0.76rem;
        line-height: 1;
        color: #b4f1d3;
        white-space: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-gutter: stable both-edges;
        font-variant-numeric: tabular-nums;
      }

      [data-keys] {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(48px, 1fr));
        gap: var(--gap);
        transform-origin: bottom right;
      }

      [data-keys][data-keypad-grow="row"] {
        animation: keypad-grow-row 820ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      [data-keys][data-keypad-grow="column"] {
        animation: keypad-grow-column 820ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      [data-keys][data-keypad-grow="both"] {
        animation: keypad-grow-both 880ms cubic-bezier(0.2, 0.7, 0.2, 1) 1;
      }

      @keyframes keypad-grow-row {
        from {
          transform: scaleY(0.92);
        }
        to {
          transform: scaleY(1);
        }
      }

      @keyframes keypad-grow-column {
        from {
          transform: scaleX(0.92);
        }
        to {
          transform: scaleX(1);
        }
      }

      @keyframes keypad-grow-both {
        from {
          transform: scale(0.92);
        }
        to {
          transform: scale(1);
        }
      }

      .storage {
        justify-self: stretch;
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--drawer-stroke);
        padding: 10px;
        background: linear-gradient(180deg, var(--drawer-wood-top), var(--drawer-wood-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.3),
          inset 0 -6px 10px rgba(0, 0, 0, 0.2),
          0 10px 16px rgba(0, 0, 0, 0.22);
      }

      .storage-title {
        margin: 0 0 8px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #362312;
        opacity: 0.9;
      }

      [data-storage-keys] {
        min-height: 48px;
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        grid-auto-rows: minmax(48px, 1fr);
        gap: var(--gap);
        border: 1px solid rgba(91, 62, 33, 0.6);
        border-radius: 10px;
        padding: 10px;
        background: linear-gradient(180deg, var(--drawer-lining-top), var(--drawer-lining-bottom));
        box-shadow: inset 0 2px 6px rgba(70, 45, 20, 0.26);
      }

      .key {
        position: relative;
        border: 1px solid var(--key-stroke);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--key-top), var(--key-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 2px 0 rgba(45, 53, 63, 0.9),
          0 4px 8px rgba(0, 0, 0, 0.28);
        color: #12151a;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 95ms ease, box-shadow 95ms ease, background 110ms ease, filter 120ms ease;
      }

      .key:hover:not(:disabled) {
        filter: brightness(1.04);
      }

      .key:active:not(:disabled) {
        transform: translateY(var(--key-press-depth));
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.35),
          0 1px 0 rgba(45, 53, 63, 0.9),
          0 3px 6px rgba(0, 0, 0, 0.25);
      }

      .key--unlock-animate {
        animation: key-unlock-pulse 1200ms cubic-bezier(0.22, 0.62, 0.22, 1) 1;
      }

      .keypad-slot-enter {
        animation: keypad-slot-enter 760ms cubic-bezier(0.2, 0.74, 0.2, 1) 1;
      }

      @keyframes key-unlock-pulse {
        0% {
          transform: translateY(0);
          filter: brightness(1);
        }
        24% {
          transform: translateY(-4px);
          filter: brightness(1.28) drop-shadow(0 0 8px rgba(188, 255, 214, 0.95));
        }
        32% {
          transform: translateY(-4px);
          filter: brightness(1.28) drop-shadow(0 0 8px rgba(188, 255, 214, 0.95));
        }
        80% {
          transform: translateY(0);
          filter: brightness(1.18) drop-shadow(0 0 7px rgba(188, 255, 214, 0.62));
        }
        100% {
          transform: translateY(0);
          filter: brightness(1);
        }
      }

      @keyframes keypad-slot-enter {
        0% {
          opacity: 0;
          transform: scale(0.92);
          filter: saturate(0.9);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: saturate(1);
        }
      }

      .key:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .key--storage {
        font-size: 0.95rem;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 1px 0 rgba(57, 39, 22, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.2);
      }

      .key--storage-unlocked {
        border-color: #676d74;
        background: linear-gradient(180deg, #a8afb7, #888f98);
        color: #2f353c;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 1px 0 rgba(56, 61, 67, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.16);
        transition: none;
        animation: none;
      }

      .key--storage-unlocked:hover:not(:disabled) {
        filter: none;
      }

      .key--storage-unlocked:active:not(:disabled) {
        transform: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 1px 0 rgba(56, 61, 67, 0.7),
          0 3px 6px rgba(0, 0, 0, 0.16);
      }

      .key--storage-unlocked.key--unlock-animate {
        animation: key-unlock-pulse 1200ms cubic-bezier(0.22, 0.62, 0.22, 1) 1;
      }

      .key--group-slot_operator {
        border-color: var(--key-slot-operator-stroke);
        background: linear-gradient(180deg, var(--key-slot-operator-top), var(--key-slot-operator-bottom));
        color: #ffffff;
      }

      .key--group-utility {
        border-color: var(--key-utility-stroke);
        background: linear-gradient(180deg, var(--key-utility-top), var(--key-utility-bottom));
        color: #ffffff;
      }

      .key--group-execution {
        border-color: var(--key-execution-stroke);
        background: linear-gradient(180deg, var(--key-execution-top), var(--key-execution-bottom));
        color: #ffffff;
      }

      .key.key--toggle-active:not(:disabled) {
        transform: translateY(var(--key-latch-depth));
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.35),
          0 1px 0 rgba(45, 53, 63, 0.9),
          0 3px 6px rgba(0, 0, 0, 0.25);
      }

      .key.key--toggle-active:not(:disabled):hover {
        filter: none;
      }

      .key.key--toggle-active:not(.key--group-slot_operator):not(.key--group-utility):not(.key--group-execution):not(:disabled) {
        background: linear-gradient(180deg, var(--key-bottom), var(--key-top));
      }

      .key.key--toggle-active.key--group-slot_operator:not(:disabled) {
        background: linear-gradient(180deg, var(--key-slot-operator-bottom), var(--key-slot-operator-top));
      }

      .key.key--toggle-active.key--group-utility:not(:disabled) {
        background: linear-gradient(180deg, var(--key-utility-bottom), var(--key-utility-top));
      }

      .key.key--toggle-active.key--group-execution:not(:disabled) {
        background: linear-gradient(180deg, var(--key-execution-bottom), var(--key-execution-top));
      }

      .key.key--toggle-animate-on:not(:disabled) {
        animation: key-toggle-latch-on 160ms cubic-bezier(0.18, 0.82, 0.22, 1) 1;
      }

      .key.key--toggle-animate-off:not(:disabled) {
        animation: key-toggle-latch-off 130ms cubic-bezier(0.2, 0.78, 0.25, 1) 1;
      }

      @keyframes key-toggle-latch-on {
        0% {
          transform: translateY(0);
        }
        52% {
          transform: translateY(var(--key-overpress-depth));
        }
        100% {
          transform: translateY(var(--key-latch-depth));
        }
      }

      @keyframes key-toggle-latch-off {
        0% {
          transform: translateY(var(--key-latch-depth));
        }
        48% {
          transform: translateY(var(--key-release-depth));
        }
        100% {
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .calc {
          animation: none !important;
        }

        [data-keys],
        [data-keys] > * {
          transition: none !important;
          animation: none !important;
        }

        .key,
        .key.key--toggle-animate-on:not(:disabled),
        .key.key--toggle-animate-off:not(:disabled) {
          transition: none;
          animation: none;
        }
      }

      .placeholder {
        position: relative;
        border-radius: 10px;
        border: 1px dashed rgba(26, 31, 39, 0.25);
        background: linear-gradient(180deg, rgba(121, 130, 145, 0.25), rgba(94, 104, 120, 0.18));
      }

      .placeholder--drop-slot {
        border-style: dashed;
      }

      .placeholder--storage-empty {
        background: linear-gradient(180deg, rgba(211, 190, 154, 0.7), rgba(191, 165, 127, 0.7));
      }

      .placeholder--execution-empty {
        border-color: rgba(48, 137, 84, 0.38);
        background: linear-gradient(180deg, rgba(139, 205, 162, 0.34), rgba(90, 164, 118, 0.24));
      }

      .keypad-slot--execution-frame {
        outline: 2px solid rgba(64, 166, 104, 0.86);
        outline-offset: -2px;
      }

      .key--draggable:not(:disabled) {
        cursor: grab;
      }

      .key--draggable:active:not(:disabled) {
        cursor: grabbing;
      }

      .drag-source {
        opacity: 0.38;
        outline: 2px solid rgba(98, 140, 215, 0.7);
      }

      .drop-target-valid {
        outline: 2px solid rgba(48, 137, 84, 0.88);
        outline-offset: -2px;
        filter: brightness(1.05);
      }

      .drop-target-invalid {
        outline: 2px solid rgba(188, 63, 63, 0.88);
        outline-offset: -2px;
      }

      .drag-ghost {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.9;
        transform: rotate(-2deg);
      }

      .slot-label {
        position: absolute;
        top: 4px;
        left: 6px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.62rem;
        line-height: 1;
        color: rgba(18, 21, 26, 0.72);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(18, 21, 26, 0.16);
        border-radius: 4px;
        padding: 1px 4px;
        pointer-events: none;
        opacity: 0;
      }

      body[data-debug-menu-open="true"] .slot-label {
        opacity: 1;
      }

      .checklist-shell {
        position: relative;
        min-height: 100%;
        border-radius: 12px;
        border: 1px solid #6b4c2f;
        padding: 14px 12px 12px;
        background: linear-gradient(180deg, #8b6b4b, #6b5038);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -6px 10px rgba(0, 0, 0, 0.2),
          0 10px 16px rgba(0, 0, 0, 0.2);
      }

      .checklist-shell::before {
        content: "";
        position: absolute;
        top: -8px;
        left: 50%;
        width: 110px;
        height: 18px;
        transform: translateX(-50%);
        border-radius: 10px;
        border: 1px solid #5a6068;
        background: linear-gradient(180deg, #b8bec7, #8f97a3);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
      }

      .checklist {
        min-height: 100%;
        border-radius: 9px;
        border: 1px solid #b9b9ad;
        padding: 10px;
        background:
          repeating-linear-gradient(180deg, rgba(124, 126, 138, 0.12) 0px, rgba(124, 126, 138, 0.12) 1px, transparent 1px, transparent 24px),
          repeating-linear-gradient(90deg, rgba(124, 126, 138, 0.09) 0px, rgba(124, 126, 138, 0.09) 1px, transparent 1px, transparent 72px),
          linear-gradient(180deg, #f5f3ec, #ebe7dc);
        color: #25292f;
        font-family: "Consolas", "Menlo", "Courier New", monospace;
        font-size: 0.72rem;
        overflow: auto;
        opacity: 0.68;
        transition: opacity 180ms ease-out;
      }

      .checklist[data-checklist-state="open"] {
        opacity: 1;
      }

      .checklist[data-checklist-animate="true"] {
        animation: checklist-open 220ms ease-out;
      }

      @keyframes checklist-open {
        from {
          transform: translateY(4px);
          opacity: 0.45;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .unlock-title {
        margin-bottom: 8px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .unlock-header,
      .unlock-row {
        display: grid;
        grid-template-columns: minmax(56px, 72px) 1fr;
        column-gap: 6px;
        align-items: center;
        min-height: 24px;
        padding: 2px 4px;
        border-bottom: 1px solid rgba(74, 80, 88, 0.25);
      }

      .unlock-header {
        font-weight: 700;
        background: rgba(186, 190, 198, 0.35);
        border-top: 1px solid rgba(74, 80, 88, 0.25);
      }

      .unlock-row {
        background: rgba(255, 255, 255, 0.28);
      }

      .unlock-row:nth-of-type(even) {
        background: rgba(218, 222, 230, 0.35);
      }

      .unlock-row--completed {
        text-decoration: line-through;
        opacity: 0.72;
      }

      .unlock-criteria {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 6px;
      }

      .unlock-criterion {
        white-space: nowrap;
      }

      .debug-shell {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 50;
        width: min(280px, calc(100vw - 24px));
        border: 1px solid rgba(32, 39, 52, 0.25);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.42);
      }

      .debug-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
      }

      .debug-menu {
        margin-top: 10px;
        display: grid;
        gap: 10px;
      }

      .debug-size {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 8px;
        align-items: center;
        font-size: 0.78rem;
      }

      .debug-size input {
        width: 100%;
        padding: 4px 6px;
        border-radius: 6px;
        border: 1px solid rgba(45, 53, 63, 0.35);
      }

      .debug-action {
        border: 1px solid #7a3434;
        border-radius: 8px;
        padding: 8px 10px;
        background: linear-gradient(180deg, #f1d7d7, #deaaaa);
        color: #3a1111;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
      }

      .debug-action:hover {
        filter: brightness(1.03);
      }

      @media (max-width: 639px) {
        body {
          padding: 16px 10px;
        }

        .app-layout {
          grid-template-columns: 1fr;
        }

        .device-row {
          grid-template-columns: 1fr;
        }

        .storage,
        .checklist-shell {
          width: min(92vw, 360px);
          justify-self: center;
        }

        .app-shell {
          width: min(92vw, 360px);
        }

        .device {
          width: 100%;
        }

        .debug-shell {
          width: min(220px, calc(100vw - 20px));
          right: 10px;
          top: 10px;
        }

        :root {
          --gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <section class="debug-shell" aria-label="Debug controls">
      <label class="debug-toggle">
        <input type="checkbox" data-debug-toggle />
        <span>Debug Menu</span>
      </label>
      <div class="debug-menu" data-debug-menu hidden>
        <div class="debug-size">
          <label for="debug-width">Width</label>
          <input id="debug-width" type="number" min="1" max="8" data-debug-keypad-width />
          <label for="debug-height">Height</label>
          <input id="debug-height" type="number" min="1" max="8" data-debug-keypad-height />
        </div>
        <button type="button" class="debug-action" data-debug-apply-keypad-size>Apply Keypad Size</button>
        <button type="button" class="debug-action" data-debug-upgrade-keypad-row>Upgrade Row</button>
        <button type="button" class="debug-action" data-debug-upgrade-keypad-column>Upgrade Column</button>
        <button type="button" class="debug-action" data-debug-clear-save>Clear Save</button>
        <button type="button" class="debug-action" data-debug-unlock-all>Unlock All</button>
      </div>
    </section>
    <div class="app-shell">
      <main id="app" class="app-layout" aria-label="AutoCalc">
        <section class="play-area">
          <div class="device-row">
            <section class="device device--grapher" data-grapher-device aria-label="Grapher">
              <div class="grapher-screen">
                <canvas class="grapher-canvas" data-grapher-canvas aria-label="Roll graph" role="img"></canvas>
              </div>
              <div class="display grapher-slot" data-grapher-slot aria-live="polite" aria-label="Grapher operation display"></div>
            </section>
            <section class="device device--calc" data-calc-device>
              <section class="roll" data-roll aria-label="Calculator roll"></section>
              <section class="calc">
                <div class="slot" aria-hidden="true"></div>
                <div class="display-stack">
                  <div class="display" data-total aria-live="polite"></div>
                  <div class="display" data-slot></div>
                </div>
                <div data-keys></div>
              </section>
            </section>
          </div>
          <section class="storage" aria-label="Button storage">
            <h2 class="storage-title">Storage Drawer</h2>
            <div data-storage-keys></div>
          </section>
        </section>
        <aside class="checklist-shell" aria-label="Unlock checklist clipboard">
          <div class="checklist" data-unlocks></div>
        </aside>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module" src="./dist/src/app/bootstrap.js"></script>
  </body>
</html>
