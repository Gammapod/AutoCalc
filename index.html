<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCalc v1 Slice</title>
    <style>
      :root {
        --bg-top: #cfd4dc;
        --bg-bottom: #a8aeb8;
        --body-top: #b8bdc7;
        --body-bottom: #8f96a1;
        --body-stroke: #66707d;
        --panel-dark: #12161c;
        --panel-mid: #202734;
        --panel-soft: #2a3444;
        --lit: #bcffd6;
        --paper: #f4f1e8;
        --paper-ink: #3f3a32;
        --key-top: #eef2f5;
        --key-bottom: #d4dae0;
        --key-stroke: #5d6773;
        --placeholder: #798291;
        --roll-row-height: 1.19rem;
        --roll-pad-top: 10px;
        --roll-pad-bottom: 8px;
        --gap: 10px;
        --device-width: clamp(300px, 38vw, 420px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 14px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: #0f1218;
      }

      .app-shell {
        display: grid;
        grid-template-columns: auto;
        align-items: start;
      }

      .device-row {
        display: grid;
        grid-template-columns: var(--device-width) var(--device-width);
        align-items: start;
        gap: 16px;
      }

      .device {
        width: 100%;
        min-width: 0;
        position: relative;
        gap: 0;
      }

      .device--grapher {
        display: flex;
        border-radius: 24px;
        padding: 14px;
        border: 1px solid var(--body-stroke);
        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -5px 10px rgba(0, 0, 0, 0.2),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .grapher-screen {
        flex: 1;
        min-height: 0;
        border: 1px solid #515c6a;
        border-radius: 10px;
        padding: 10px;
        background: linear-gradient(180deg, rgba(18, 22, 28, 0.98), rgba(15, 19, 24, 0.98));
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }

      .grapher-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .roll {
        position: absolute;
        left: 50%;
        bottom: 100%;
        z-index: 1;
        transform: translateX(-50%);
        width: calc(100% - 56px);
        height: 0;
        background: repeating-linear-gradient(
          180deg,
          var(--paper) 0px,
          var(--paper) 26px,
          #ece8de 27px,
          var(--paper) 28px
        );
        border: 0 solid #c8c2b4;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        box-shadow: none;
        overflow: hidden;
        pointer-events: none;
        scrollbar-width: none;
        padding: var(--roll-pad-top) 12px var(--roll-pad-bottom);
        font-family: "Courier Prime", "Special Elite", "American Typewriter", "Lucida Typewriter", "Courier New", monospace;
        font-size: 0.85rem;
        color: var(--paper-ink);
        transition: height 160ms ease-out, border-width 120ms ease-out, box-shadow 120ms ease-out;
      }

      .roll::-webkit-scrollbar {
        display: none;
      }

      .roll[data-roll-visible="true"] {
        height: calc(var(--roll-line-count, 0) * var(--roll-row-height) + var(--roll-pad-top) + var(--roll-pad-bottom));
        border-width: 1px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.18);
      }

      .roll-line {
        display: grid;
        grid-template-columns: 3ch 1fr auto;
        column-gap: 1ch;
        line-height: 1.4;
      }

      .roll-prefix {
        grid-column: 1;
        text-align: left;
        white-space: pre;
      }

      .roll-value {
        grid-column: 3;
        justify-self: end;
        text-align: right;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .calc {
        position: relative;
        overflow: visible;
        z-index: 2;
        border-radius: 24px;
        padding: 16px;
        border: 1px solid var(--body-stroke);
        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -5px 10px rgba(0, 0, 0, 0.2),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }

      @media (prefers-reduced-motion: reduce) {
        .roll {
          transition: none;
        }

        .status {
          transition: none;
        }
      }

      .slot {
        height: 10px;
        margin: 0 22px 12px;
        border-radius: 999px;
        border: 1px solid #596271;
        background: linear-gradient(180deg, #3f4854, #2e3540);
        box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.6);
      }

      .display-stack {
        display: grid;
        gap: 8px;
      }

      .display {
        border: 1px solid #515c6a;
        border-radius: 7px;
        padding: 10px 12px;
        background: linear-gradient(180deg, var(--panel-mid), var(--panel-dark));
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }

      [data-total] {
        min-height: 70px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .seg-frame {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 6px;
      }

      .seg-digit {
        position: relative;
        width: clamp(16px, 2.6vw, 22px);
        height: clamp(28px, 4.2vw, 38px);
      }

      .seg {
        position: absolute;
        border-radius: 999px;
        background: var(--lit);
        opacity: 0.12;
      }

      .seg-digit--locked .seg {
        opacity: 0;
      }

      .seg--on {
        opacity: 1;
        box-shadow: 0 0 6px rgba(188, 255, 214, 0.45);
      }

      .seg-a,
      .seg-d,
      .seg-g {
        left: 20%;
        width: 60%;
        height: 10%;
      }

      .seg-a {
        top: 2%;
      }

      .seg-g {
        top: 45%;
      }

      .seg-d {
        top: 88%;
      }

      .seg-b,
      .seg-c,
      .seg-e,
      .seg-f {
        width: 12%;
        height: 42%;
      }

      .seg-b,
      .seg-c {
        left: 82%;
      }

      .seg-e,
      .seg-f {
        left: 6%;
      }

      .seg-f {
        top: 6%;
      }

      .seg-b {
        top: 6%;
      }

      .seg-e {
        top: 52%;
      }

      .seg-c {
        top: 52%;
      }

      [data-slot] {
        min-height: 30px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.76rem;
        color: #b4f1d3;
        white-space: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
      }

      [data-keys] {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(6, minmax(48px, 1fr));
        gap: var(--gap);
      }

      .key {
        position: relative;
        border: 1px solid var(--key-stroke);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--key-top), var(--key-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 2px 0 rgba(45, 53, 63, 0.9),
          0 4px 8px rgba(0, 0, 0, 0.28);
        color: #12151a;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 70ms ease, filter 120ms ease;
      }

      .key:hover:not(:disabled) {
        filter: brightness(1.04);
      }

      .key:active:not(:disabled) {
        transform: translateY(2px);
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.35),
          0 1px 0 rgba(45, 53, 63, 0.9),
          0 3px 6px rgba(0, 0, 0, 0.25);
      }

      .key:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .key--wide {
        grid-column: span 2;
      }

      .key--tall {
        grid-row: span 2;
        background: linear-gradient(180deg, #e8f6ea, #c4d5c8);
      }

      .placeholder {
        position: relative;
        border-radius: 10px;
        border: 1px dashed rgba(26, 31, 39, 0.25);
        background: linear-gradient(180deg, rgba(121, 130, 145, 0.25), rgba(94, 104, 120, 0.18));
      }

      .slot-label {
        position: absolute;
        top: 4px;
        left: 6px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.62rem;
        line-height: 1;
        color: rgba(18, 21, 26, 0.72);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(18, 21, 26, 0.16);
        border-radius: 4px;
        padding: 1px 4px;
        pointer-events: none;
        opacity: 0;
      }

      body[data-debug-menu-open="true"] .slot-label {
        opacity: 1;
      }

      .status {
        position: absolute;
        left: 12px;
        right: 12px;
        top: calc(100% - 10px);
        border: 1px solid #515c6a;
        border-radius: 7px;
        padding: 8px 10px;
        background: linear-gradient(180deg, var(--panel-mid), var(--panel-dark));
        color: #b4f1d3;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.75rem;
        box-shadow: 0 8px 14px rgba(0, 0, 0, 0.26);
        transform: translateY(-8px);
        opacity: 0;
        max-height: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .status[data-checklist-state="open"] {
        transform: translateY(0);
        opacity: 1;
        max-height: 240px;
        pointer-events: auto;
      }

      .status[data-checklist-animate="true"] {
        transition: transform 220ms ease-out, opacity 180ms ease-out, max-height 220ms ease-out;
      }

      .unlock-title {
        margin-bottom: 6px;
        font-weight: 700;
      }

      .unlock-header,
      .unlock-row {
        display: grid;
        grid-template-columns: minmax(40px, 60px) 1fr;
        column-gap: 8px;
        align-items: start;
      }

      .unlock-header {
        margin-bottom: 4px;
        font-weight: 700;
      }

      .unlock-row {
        margin-bottom: 2px;
      }

      .unlock-row--completed {
        text-decoration: line-through;
        opacity: 0.72;
      }

      .unlock-criteria {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .unlock-criterion {
        white-space: nowrap;
      }

      .debug-shell {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 50;
        width: min(280px, calc(100vw - 24px));
        border: 1px solid rgba(32, 39, 52, 0.25);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.42);
      }

      .debug-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
      }

      .debug-menu {
        margin-top: 10px;
        display: grid;
        gap: 10px;
      }

      .debug-action {
        border: 1px solid #7a3434;
        border-radius: 8px;
        padding: 8px 10px;
        background: linear-gradient(180deg, #f1d7d7, #deaaaa);
        color: #3a1111;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
      }

      .debug-action:hover {
        filter: brightness(1.03);
      }

      @media (max-width: 639px) {
        body {
          padding: 16px 10px;
        }

        .device-row {
          grid-template-columns: 1fr;
        }

        .app-shell {
          width: min(92vw, 360px);
        }

        .device {
          width: 100%;
        }

        .debug-shell {
          width: min(220px, calc(100vw - 20px));
          right: 10px;
          top: 10px;
        }

        :root {
          --gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <section class="debug-shell" aria-label="Debug controls">
      <label class="debug-toggle">
        <input type="checkbox" data-debug-toggle />
        <span>Debug Menu</span>
      </label>
      <div class="debug-menu" data-debug-menu hidden>
        <button type="button" class="debug-action" data-debug-clear-save>Clear Save</button>
      </div>
    </section>
    <div class="app-shell">
      <main id="app" class="device-row" aria-label="AutoCalc">
        <section class="device device--grapher" data-grapher-device aria-label="Grapher">
          <div class="grapher-screen">
            <canvas class="grapher-canvas" data-grapher-canvas aria-label="Roll graph" role="img"></canvas>
          </div>
        </section>
        <section class="device device--calc" data-calc-device>
          <section class="roll" data-roll aria-label="Calculator roll"></section>
          <section class="calc">
            <div class="slot" aria-hidden="true"></div>
            <div class="display-stack">
              <div class="display" data-total aria-live="polite"></div>
              <div class="display" data-slot></div>
            </div>
            <div data-keys></div>
            <div class="status" data-unlocks></div>
          </section>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script type="module" src="./dist/src/app/bootstrap.js"></script>
  </body>
</html>
