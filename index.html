<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCalc v1 Slice</title>
    <style>
      :root {
        --bg-top: #cfd4dc;
        --bg-bottom: #a8aeb8;
        --body-top: #b8bdc7;
        --body-bottom: #8f96a1;
        --body-stroke: #66707d;
        --panel-dark: #12161c;
        --panel-mid: #202734;
        --panel-soft: #2a3444;
        --lit: #bcffd6;
        --paper: #f4f1e8;
        --paper-ink: #3f3a32;
        --key-top: #eef2f5;
        --key-bottom: #d4dae0;
        --key-stroke: #5d6773;
        --placeholder: #798291;
        --gap: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 14px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: #0f1218;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(260px, 300px) minmax(300px, 420px);
        align-items: start;
        gap: 16px;
      }

      .device {
        width: min(100%, 420px);
        min-width: 300px;
        display: grid;
        gap: 0;
      }

      .roll {
        margin: 0 auto;
        width: calc(100% - 56px);
        height: clamp(96px, 18vh, 180px);
        background: repeating-linear-gradient(
          180deg,
          var(--paper) 0px,
          var(--paper) 26px,
          #ece8de 27px,
          var(--paper) 28px
        );
        border: 1px solid #c8c2b4;
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.18);
        overflow-y: auto;
        padding: 10px 12px 8px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.85rem;
        color: var(--paper-ink);
      }

      .roll-line {
        white-space: nowrap;
        line-height: 1.4;
      }

      .calc {
        border-radius: 24px;
        padding: 16px;
        border: 1px solid var(--body-stroke);
        background: linear-gradient(180deg, var(--body-top), var(--body-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -5px 10px rgba(0, 0, 0, 0.2),
          0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .slot {
        height: 10px;
        margin: 0 22px 12px;
        border-radius: 999px;
        border: 1px solid #596271;
        background: linear-gradient(180deg, #3f4854, #2e3540);
        box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.6);
      }

      .display-stack {
        display: grid;
        gap: 8px;
      }

      .display {
        border: 1px solid #515c6a;
        border-radius: 7px;
        padding: 10px 12px;
        background: linear-gradient(180deg, var(--panel-mid), var(--panel-dark));
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.7);
      }

      [data-total] {
        min-height: 70px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .seg-frame {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 6px;
      }

      .seg-digit {
        position: relative;
        width: clamp(16px, 2.6vw, 22px);
        height: clamp(28px, 4.2vw, 38px);
      }

      .seg {
        position: absolute;
        border-radius: 999px;
        background: var(--lit);
        opacity: 0.12;
      }

      .seg-digit--locked .seg {
        opacity: 0;
      }

      .seg--on {
        opacity: 1;
        box-shadow: 0 0 6px rgba(188, 255, 214, 0.45);
      }

      .seg-a,
      .seg-d,
      .seg-g {
        left: 20%;
        width: 60%;
        height: 10%;
      }

      .seg-a {
        top: 2%;
      }

      .seg-g {
        top: 45%;
      }

      .seg-d {
        top: 88%;
      }

      .seg-b,
      .seg-c,
      .seg-e,
      .seg-f {
        width: 12%;
        height: 42%;
      }

      .seg-b,
      .seg-c {
        left: 82%;
      }

      .seg-e,
      .seg-f {
        left: 6%;
      }

      .seg-f {
        top: 6%;
      }

      .seg-b {
        top: 6%;
      }

      .seg-e {
        top: 52%;
      }

      .seg-c {
        top: 52%;
      }

      [data-slot] {
        min-height: 30px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.76rem;
        color: #b4f1d3;
        white-space: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
      }

      [data-keys] {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(5, minmax(48px, 1fr));
        gap: var(--gap);
      }

      .key {
        border: 1px solid var(--key-stroke);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--key-top), var(--key-bottom));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 2px 0 rgba(45, 53, 63, 0.9),
          0 4px 8px rgba(0, 0, 0, 0.28);
        color: #12151a;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 70ms ease, filter 120ms ease;
      }

      .key:hover:not(:disabled) {
        filter: brightness(1.04);
      }

      .key:active:not(:disabled) {
        transform: translateY(2px);
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.35),
          0 1px 0 rgba(45, 53, 63, 0.9),
          0 3px 6px rgba(0, 0, 0, 0.25);
      }

      .key:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .key--wide {
        grid-column: span 2;
      }

      .key--tall {
        grid-row: span 2;
        background: linear-gradient(180deg, #e8f6ea, #c4d5c8);
      }

      .placeholder {
        border-radius: 10px;
        border: 1px dashed rgba(26, 31, 39, 0.25);
        background: linear-gradient(180deg, rgba(121, 130, 145, 0.25), rgba(94, 104, 120, 0.18));
      }

      .status {
        margin-top: 10px;
        text-align: center;
        font-size: 0.75rem;
        color: #1f2430;
        opacity: 0.75;
      }

      .debug-shell {
        width: 100%;
        min-width: 260px;
        border: 1px solid rgba(32, 39, 52, 0.25);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.42);
      }

      .debug-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
      }

      .debug-menu {
        margin-top: 10px;
        display: grid;
        gap: 10px;
      }

      .debug-action {
        border: 1px solid #7a3434;
        border-radius: 8px;
        padding: 8px 10px;
        background: linear-gradient(180deg, #f1d7d7, #deaaaa);
        color: #3a1111;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
      }

      .debug-action:hover {
        filter: brightness(1.03);
      }

      .debug-tech-list {
        border: 1px solid rgba(32, 39, 52, 0.25);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.65);
        max-height: 340px;
        overflow-y: auto;
        padding: 8px;
        display: grid;
        gap: 6px;
      }

      .debug-tech-summary {
        font-size: 0.78rem;
        font-weight: 700;
        color: #1b2230;
      }

      .debug-tech-row {
        display: grid;
        grid-template-columns: 62px 1fr;
        gap: 8px;
        align-items: center;
        font-size: 0.76rem;
        padding: 5px 6px;
        border-radius: 6px;
        background: rgba(230, 235, 242, 0.65);
      }

      .debug-tech-status {
        font-weight: 700;
        color: #293140;
      }

      .debug-tech-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .debug-tech-error {
        font-size: 0.78rem;
        color: #5a1f1f;
      }

      @media (max-width: 639px) {
        body {
          padding: 16px 10px;
        }

        .app-shell {
          grid-template-columns: 1fr;
        }

        .device {
          width: min(92vw, 360px);
          min-width: 300px;
        }

        .debug-shell {
          width: min(92vw, 360px);
          min-width: 300px;
        }

        .roll {
          height: 96px;
        }

        :root {
          --gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <section class="debug-shell" aria-label="Debug controls">
        <label class="debug-toggle">
          <input type="checkbox" data-debug-toggle />
          <span>Debug Menu</span>
        </label>
        <div class="debug-menu" data-debug-menu hidden>
          <button type="button" class="debug-action" data-debug-clear-save>Clear Save</button>
          <div class="debug-tech-list" data-debug-tech-list></div>
        </div>
      </section>
      <main id="app" class="device" aria-label="AutoCalc">
        <section class="roll" data-roll aria-label="Calculator roll"></section>
        <section class="calc">
          <div class="slot" aria-hidden="true"></div>
          <div class="display-stack">
            <div class="display" data-total aria-live="polite"></div>
            <div class="display" data-slot></div>
          </div>
          <div data-keys></div>
          <div class="status" data-unlocks></div>
        </section>
      </main>
    </div>
    <script type="module" src="./dist/src/app/bootstrap.js"></script>
  </body>
</html>
